version: '3.9'

services:
  backend:
    build:
      context: ./backend/erp
      dockerfile: Dockerfile
    container_name: vantage-erp-backend
    ports:
      - '8080:8080'
    env_file:
      - ./backend/erp/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: vantage-erp-frontend
    ports:
      - '3000:80'
    depends_on:
      - backend
    restart: unless-stopped
